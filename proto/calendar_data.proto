syntax = "proto3";

package calendar;

import "proto/calendar.proto";

option go_package = "github.com/waydxd/Orbit-Orbi/proto/calendar";

// CalendarDataService defines the gRPC service for Core to expose calendar data to Agent
// Agent calls this service to fetch calendar data while processing user requests
service CalendarDataService {
  // GetCalendarData retrieves calendar events for a given user and time range
  rpc GetCalendarData(GetCalendarDataRequest) returns (GetCalendarDataResponse);
  
  // GetUserAvailability checks user availability for a specific time slot
  rpc GetUserAvailability(GetUserAvailabilityRequest) returns (GetUserAvailabilityResponse);
  
  // QueryEvents performs complex queries on calendar events
  rpc QueryEvents(QueryEventsRequest) returns (QueryEventsResponse);
}

// GetCalendarDataRequest is used by Agent to request calendar data from Core
message GetCalendarDataRequest {
  string user_id = 1;
  int64 start_time = 2;  // Unix timestamp
  int64 end_time = 3;    // Unix timestamp
  repeated string categories = 4;  // Optional: filter by event categories
}

// GetCalendarDataResponse contains calendar events from Core
message GetCalendarDataResponse {
  repeated Event events = 1;
  bool success = 2;
  string message = 3;
}

// GetUserAvailabilityRequest checks if a user is available during a time slot
message GetUserAvailabilityRequest {
  string user_id = 1;
  int64 start_time = 2;
  int64 end_time = 3;
}

// AvailabilityStatus represents the availability of a user
message AvailabilityStatus {
  bool available = 1;
  string reason = 2;
  repeated Event conflicting_events = 3;
}

// GetUserAvailabilityResponse contains availability information
message GetUserAvailabilityResponse {
  AvailabilityStatus status = 1;
  bool success = 2;
  string message = 3;
}

// QueryEventsRequest allows Agent to perform complex queries on events
message QueryEventsRequest {
  string user_id = 1;
  int64 start_time = 2;
  int64 end_time = 3;
  string query = 4;  // Free-form query string (e.g., "meetings with john")
  repeated string tags = 5;  // Optional tags to filter by
}

// QueryEventsResponse contains results of the query
message QueryEventsResponse {
  repeated Event events = 1;
  int32 total_count = 2;
  bool success = 3;
  string message = 4;
}
