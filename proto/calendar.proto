syntax = "proto3";

package calendar;

option optimize_for = LITE_RUNTIME;
option go_package = "github.com/waydxd/Orbit-Orbi/proto";

// ================================
// Services
// ================================

// CalendarService: Core backend CRUD and scheduling operations.
// Implemented by Backend/Core. Consumed by external clients (optional).
service CalendarService {
  // CreateEvent creates a new calendar event
  rpc CreateEvent(CreateEventRequest) returns (CreateEventResponse);

  // GetEvents retrieves events within a time range
  rpc GetEvents(GetEventsRequest) returns (GetEventsResponse);

  // UpdateEvent updates an existing event
  rpc UpdateEvent(UpdateEventRequest) returns (UpdateEventResponse);

  // DeleteEvent deletes an event
  rpc DeleteEvent(DeleteEventRequest) returns (DeleteEventResponse);

  // GetAvailableSlots finds available time slots for the user
  rpc GetAvailableSlots(GetAvailableSlotsRequest) returns (GetAvailableSlotsResponse);
}

// CalendarDataService: Core exposes read/query endpoints for the Agent.
// Implemented by Backend/Core. Consumed by Agent.
service CalendarDataService {
  // GetCalendarData retrieves calendar events for a given user and time range
  rpc GetCalendarData(GetCalendarDataRequest) returns (GetCalendarDataResponse);

  // GetUserAvailability checks user availability for a specific time slot
  rpc GetUserAvailability(GetUserAvailabilityRequest) returns (GetUserAvailabilityResponse);

  // QueryEvents performs complex queries on calendar events
  rpc QueryEvents(QueryEventsRequest) returns (QueryEventsResponse);
}

// ================================
// Domain messages
// ================================

message Event {
  string id = 1;
  string user_id = 2;
  string title = 3;
  string description = 4;
  int64 start_time = 5;  // Unix timestamp (seconds)
  int64 end_time = 6;    // Unix timestamp (seconds)
  string location = 7;
  repeated string attendees = 8;
  string recurrence = 9;
  string status = 10;     // e.g., "confirmed", "tentative", "cancelled"
}

// ================================
// CalendarService messages
// ================================

message CreateEventRequest {
  string user_id = 1;
  string title = 2;
  string description = 3;
  int64 start_time = 4;
  int64 end_time = 5;
  string location = 6;
  repeated string attendees = 7;
  string recurrence = 8;
  string status = 9;
}

message CreateEventResponse {
  Event event = 1;
  bool success = 2;
  string message = 3;
}

message GetEventsRequest {
  string user_id = 1;
  int64 start_time = 2;
  int64 end_time = 3;
  string status = 4;  // Optional filter by status
}

message GetEventsResponse {
  repeated Event events = 1;
  bool success = 2;
  string message = 3;
}

message UpdateEventRequest {
  string user_id = 1;
  string id = 2;
  string title = 3;
  string description = 4;
  int64 start_time = 5;
  int64 end_time = 6;
  string location = 7;
  repeated string attendees = 8;
  string recurrence = 9;
  string status = 10;
}

message UpdateEventResponse {
  Event event = 1;
  bool success = 2;
  string message = 3;
}

message DeleteEventRequest {
  string user_id = 1;
  string id = 2;
}

message DeleteEventResponse {
  bool success = 1;
  string message = 2;
}

message GetAvailableSlotsRequest {
  string user_id = 1;
  int64 start_time = 2;
  int64 end_time = 3;
  int64 duration = 4;  // Duration in seconds
}

message TimeSlot {
  int64 start_time = 1;
  int64 end_time = 2;
}

message GetAvailableSlotsResponse {
  repeated TimeSlot slots = 1;
  bool success = 2;
  string message = 3;
}

// ================================
// CalendarDataService messages
// ================================

message GetCalendarDataRequest {
  string user_id = 1;
  int64 start_time = 2;
  int64 end_time = 3;
  repeated string categories = 4;  // Optional: filter by event categories
}

message GetCalendarDataResponse {
  repeated Event events = 1;
  bool success = 2;
  string message = 3;
}

message GetUserAvailabilityRequest {
  string user_id = 1;
  int64 start_time = 2;
  int64 end_time = 3;
}

message AvailabilityStatus {
  bool available = 1;
  string reason = 2;
  repeated Event conflicting_events = 3;
}

message GetUserAvailabilityResponse {
  AvailabilityStatus status = 1;
  bool success = 2;
  string message = 3;
}

message QueryEventsRequest {
  string user_id = 1;
  int64 start_time = 2;
  int64 end_time = 3;
  string query = 4;           // Free-form query string (e.g., "meetings with john")
  repeated string tags = 5;   // Optional tags to filter by
}

message QueryEventsResponse {
  repeated Event events = 1;
  int32 total_count = 2;
  bool success = 3;
  string message = 4;
}
