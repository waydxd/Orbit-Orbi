syntax = "proto3";

package calendar;

option go_package = "github.com/waydxd/Orbit-Orbi/proto/calendar";

// CalendarService defines the gRPC service for calendar operations
service CalendarService {
  // CreateEvent creates a new calendar event
  rpc CreateEvent(CreateEventRequest) returns (CreateEventResponse);
  
  // GetEvents retrieves events within a time range
  rpc GetEvents(GetEventsRequest) returns (GetEventsResponse);
  
  // UpdateEvent updates an existing event
  rpc UpdateEvent(UpdateEventRequest) returns (UpdateEventResponse);
  
  // DeleteEvent deletes an event
  rpc DeleteEvent(DeleteEventRequest) returns (DeleteEventResponse);
  
  // GetAvailableSlots finds available time slots
  rpc GetAvailableSlots(GetAvailableSlotsRequest) returns (GetAvailableSlotsResponse);
}

// AgentService defines the gRPC service for agent operations (implemented by Agent)
service AgentService {
  // ProcessMessage processes a user message and returns a response
  rpc ProcessMessage(ProcessMessageRequest) returns (ProcessMessageResponse);
  
  // GetAgentState returns the current state of the agent
  rpc GetAgentState(GetAgentStateRequest) returns (GetAgentStateResponse);
}

// Event represents a calendar event
message Event {
  string id = 1;
  string title = 2;
  string description = 3;
  int64 start_time = 4;  // Unix timestamp
  int64 end_time = 5;    // Unix timestamp
  string location = 6;
  repeated string attendees = 7;
  string status = 8;
}

// CreateEventRequest contains the details for creating an event
message CreateEventRequest {
  string title = 1;
  string description = 2;
  int64 start_time = 3;
  int64 end_time = 4;
  string location = 5;
  repeated string attendees = 6;
}

// CreateEventResponse contains the created event
message CreateEventResponse {
  Event event = 1;
  bool success = 2;
  string message = 3;
}

// GetEventsRequest specifies the time range for events
message GetEventsRequest {
  int64 start_time = 1;
  int64 end_time = 2;
  string status = 3;  // Optional filter by status
}

// GetEventsResponse contains the list of events
message GetEventsResponse {
  repeated Event events = 1;
  bool success = 2;
  string message = 3;
}

// UpdateEventRequest contains the event updates
message UpdateEventRequest {
  string id = 1;
  string title = 2;
  string description = 3;
  int64 start_time = 4;
  int64 end_time = 5;
  string location = 6;
  repeated string attendees = 7;
  string status = 8;
}

// UpdateEventResponse contains the updated event
message UpdateEventResponse {
  Event event = 1;
  bool success = 2;
  string message = 3;
}

// DeleteEventRequest specifies which event to delete
message DeleteEventRequest {
  string id = 1;
}

// DeleteEventResponse confirms the deletion
message DeleteEventResponse {
  bool success = 1;
  string message = 2;
}

// GetAvailableSlotsRequest specifies parameters for finding free slots
message GetAvailableSlotsRequest {
  int64 start_time = 1;
  int64 end_time = 2;
  int64 duration = 3;  // Duration in seconds
}

// TimeSlot represents an available time slot
message TimeSlot {
  int64 start_time = 1;
  int64 end_time = 2;
}

// GetAvailableSlotsResponse contains available time slots
message GetAvailableSlotsResponse {
  repeated TimeSlot slots = 1;
  bool success = 2;
  string message = 3;
}

// ProcessMessageRequest contains a user message for the agent to process
message ProcessMessageRequest {
  string message = 1;
  string session_id = 2;  // Optional session ID for context tracking
}

// ProcessMessageResponse contains the agent's response to a user message
message ProcessMessageResponse {
  string response = 1;
  bool success = 2;
  string error = 3;
  string session_id = 4;
}

// GetAgentStateRequest requests the current state of the agent
message GetAgentStateRequest {
  string session_id = 1;
}

// GetAgentStateResponse contains the agent's current state
message GetAgentStateResponse {
  bool ready = 1;
  string status = 2;
  string message = 3;
}
